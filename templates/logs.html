<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>履歴</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background-color: #F3F3F3;
}

.header {
    background-color: #232F3E;
    color: white;
    padding: 10px 20px;
}

.header a {
    color: #FF9900;
    text-decoration: none;
    font-weight: bold;
}

.container {
    padding: 20px;
}

/* 横スクロール */
.table-wrap {
    overflow-x: auto;
}

table {
    width: 100%;
    min-width: 500px;
    border-collapse: collapse;
    background: white;
}

th {
    background-color: #232F3E;
    color: white;
    padding: 8px;
}

td {
    padding: 8px;
    border-bottom: 1px solid #ddd;
}

tr:hover {
    background-color: #e3f2fd;
}
</style>

</head>
<body>

<div class="header">
    <a href="/">← 在庫に戻る</a>
</div>

<div class="container">

<h1>履歴</h1>

{% if logs %}
<div class="table-wrap">
<table>
<tr>
<th>商品</th>
<th>数量</th>
<th>区分</th>
</tr>

{% for l in logs %}
<tr>
<td>{{ l.name }}</td>
<td>{{ l.quantity }}</td>
<td>{{ l.status }}</td>
</tr>
{% endfor %}

</table>
</div>
{% else %}
<p>履歴がありません</p>
{% endif %}

</div>

</body>
</html>
