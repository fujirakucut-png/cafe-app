<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>

<h1>編集</h1>

<form method="post" action="/update/{{ product.id }}">
<input name="name" value="{{ product.name }}">

<select name="category_id">
{% for c in categories %}
<option value="{{ c.id }}" {% if c.id == product.category_id %}selected{% endif %}>
{{ c.name }}
</option>
{% endfor %}
</select>

<select name="unit_id">
{% for u in units %}
<option value="{{ u.id }}" {% if u.id == product.unit_id %}selected{% endif %}>
{{ u.name }}
</option>
{% endfor %}
</select>

<button>更新</button>
</form>

<a href="/">戻る</a>

</body>
</html>
